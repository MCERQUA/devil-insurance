<!DOCTYPE html>
<html>
<head><title>Netlify Form Detection</title></head>
<body>
  <form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote-request" />
    <input type="text" name="businessName" />
    <input type="text" name="tradeType" />
    <input type="number" name="yearsInBusiness" />
    <input type="checkbox" name="coverageGL" />
    <input type="checkbox" name="coverageWC" />
    <input type="checkbox" name="coverageAuto" />
    <input type="text" name="revenue" />
    <input type="text" name="fullName" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
