<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Forms</title><meta name="robots" content="noindex, nofollow"></head>
<body>
  <!-- Detection stubs — fields MUST mirror the real forms or Netlify drops unlisted fields. -->
  <form name="quote" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote">
    <input name="bot-field">
    <input name="name">
    <input name="email" type="email">
    <input name="phone" type="tel">
    <input name="town">
    <input name="coverage">
    <input name="currentCoverage">
    <textarea name="message"></textarea>
    <input name="traffic_source">
    <input name="landing_url">
    <button type="submit">Submit</button>
  </form>
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact">
    <input name="bot-field">
    <input name="name">
    <input name="email" type="email">
    <input name="phone" type="tel">
    <input name="subject">
    <textarea name="message"></textarea>
    <input name="traffic_source">
    <input name="landing_url">
    <button type="submit">Submit</button>
  </form>
</body>
</html>
